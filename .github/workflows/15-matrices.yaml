name: 15 - Working with Matrices

on:
  workflow_dispatch:

jobs:
  backwards-compatibility:
    name: ${{ matrix.os }} ${{ matrix.node-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        node-version: [18.x, 20.x, 24.x]
        os: 
            - ubuntu-latest
            - windows-latest
        include:
            - os: ubuntu-latest
              node-version: 16.x
            - os: ubuntu-latest
              node-version: 21.x
              tag: experimental
    steps:
      - name: Setup Node
        uses: actions/setup-node@v5
        with: 
          node-version: ${{ matrix.node-version }}
      - name: Fail if experimental
        if: matrix.tag == 'experimental'
        run: exit 1
      - name: Perform some tests
        run: |
          echo "Running tests on Node.js ${{ matrix.node-version }} on ${{ matrix.os }}"
          sleep 10
      - name: Upload test results
        run: echo "Uploading test results"
  include-example:
    name: ${{ matrix.color }}-${{ matrix.shape }}-${{ matrix.size }}
    runs-on: ubuntu-latest
    strategy:
        matrix:
          color: [red, green]
          shape: [circle, square]
          size: [small, large]
          include:
            - color: red
              shape: triangle
    steps:
      - name: Dummy step
        run: echo "Running example for ${{ matrix.color }}-${{ matrix.shape }}-${{ matrix.size }}"
