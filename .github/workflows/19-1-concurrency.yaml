name: 19 - Managing Concurrency

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
    ping:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout code
            uses: actions/checkout@v4
          - name: Ping URL
            id: ping-url
            uses: ./.github/actions/docker-ping-url
            with:
              url: https://www.invalid-jkhlkjhlgtfi7tyugiltuytgpjolkjkhkhjvgdtrge.com
              max_trials: 20
              delay: 5
